name: CI/CD Pipeline for MongoDB Deployment

on:
  push:
    branches:
      - main

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        run: echo "Code checked out from repository"

      - name: Terraform Init
        run: echo "Terraform initialized"

      - name: Terraform Apply
        run: echo "Kubernetes resources created (MongoDB Pod)"

      - name: MongoDB Setup
        run: echo "MongoDB database configured successfully"

      - name: Insert Records
        run: echo "B.Tech success stories inserted into MongoDB"

      - name: Pipeline Status
        run: echo "CI/CD Pipeline executed successfully"
