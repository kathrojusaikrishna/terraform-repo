name: Terraform CI/CD

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: hashicorp/setup-terraform@v3

      - name: Init
        run: terraform init -backend=false

      - name: Plan
        run: terraform plan -var="enable_k8s=false" -refresh=false
